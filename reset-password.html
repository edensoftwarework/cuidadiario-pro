<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña — CuidaDiario PRO</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
    <link rel="stylesheet" href="css/styles-b2b.css">
</head>
<body>
<div class="auth-bg">
    <div class="auth-card" style="max-width:400px">
        <div class="auth-logo">
            <span class="logo-emoji">🔑</span>
            <h1>CuidaDiario <span>PRO</span></h1>
            <p>Restablecer contraseña</p>
        </div>
        <div id="alertMsg"></div>
        <form id="resetForm">
            <div class="form-group">
                <label class="form-label">Nueva contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="Mín. 8 caracteres" required minlength="8">
            </div>
            <div class="form-group">
                <label class="form-label">Confirmar contraseña</label>
                <input type="password" name="password2" class="form-control" placeholder="Repetir contraseña" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block" id="resetBtn">Restablecer contraseña</button>
            <div class="text-center mt-12">
                <a href="login.html" class="auth-link">← Volver al login</a>
            </div>
        </form>
    </div>
</div>

<script src="js/api-b2b.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (!token) { document.getElementById('alertMsg').innerHTML = '<div class="alert alert-danger">❌ Link inválido o expirado</div>'; }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const f = e.target;
        if (f.password.value !== f.password2.value) { document.getElementById('alertMsg').innerHTML = '<div class="alert alert-danger">Las contraseñas no coinciden</div>'; return; }
        const btn = document.getElementById('resetBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Restableciendo...';
        try {
            await API_B2B.resetPassword(token, f.password.value);
            document.getElementById('alertMsg').innerHTML = '<div class="alert alert-success">✅ Contraseña actualizada. Redirigiendo...</div>';
            setTimeout(() => window.location.href = 'login.html', 1500);
        } catch (err) {
            document.getElementById('alertMsg').innerHTML = `<div class="alert alert-danger">❌ ${err.message}</div>`;
            btn.disabled = false;
            btn.innerHTML = 'Restablecer contraseña';
        }
    });
</script>
</body>
</html>
