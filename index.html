<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuidaDiario PRO</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>ðŸ¥</text></svg>">
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin:0; background:#0D2B6B; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .spin { width:36px; height:36px; border:3px solid rgba(255,255,255,.2); border-top-color:#fff; border-radius:50%; animation:sp .7s linear infinite; }
        @keyframes sp { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<div class="spin"></div>
<script src="js/api-b2b.js"></script>
<script>
(function () {
    if (API_B2B.isAuth()) {
        var u = API_B2B.getUser();
        if (u && (u.rol === 'cuidador_staff' || u.rol === 'medico')) { window.location.replace('pages/cuidador.html'); return; }
        if (u && u.rol === 'familiar')                                 { window.location.replace('pages/familiar.html');  return; }
        if (u && u.rol === 'admin_institucion' && !u.onboarding_done)  { window.location.replace('pages/onboarding.html'); return; }
        window.location.replace('pages/dashboard.html');
    } else {
        window.location.replace('landing.html');
    }
})();
</script>
</body>
</html>
